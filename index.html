<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pagina di Registrazione</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="registration-container">
    <h2>Registrazione Utente</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label>Nome:</label>
            <input type="text" id="nome" required>
        </div>
        
        <div class="form-group">
            <label>Cognome:</label>
            <input type="text" id="cognome" required>
        </div>

        <div class="form-group">
            <label>Data di Nascita:</label>
            <input type="date" id="dataNascita" required>
        </div>

        <div class="form-group">
            <label>Luogo di Nascita:</label>
            <input type="text" id="luogoNascita" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Conferma Email:</label>
            <input type="email" id="emailConfirm" required>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" required>
            <small>Min. 8 caratteri: 1 Maiusc, 1 Minusc, 1 Numero, 1 Speciale (,!£$&%§)</small>
        </div>

        <button type="submit">Registrati</button>
        <p id="error-message" class="error"></p>
        <p id="success-message" class="success"></p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
